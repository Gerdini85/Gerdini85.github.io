{% extends 'base.html' %}
{% block main %}
    <h1>{{ title }}</h1>
    <form action="{{ url_for('book_edit', book_id=book['id']) }}" method="post" class="edit-form">
        {% include 'book/_form.html' %}
    </form>

    <ul class="action-list">
        <li><a href="{{ url_for('book_index') }}">Back to list</a></li>
        <li>
            <form action="{{ url_for('book_delete', book_id=book['id']) }}" method="post">
                <input type="submit" value="Delete" onclick="return confirm('Are you sure?')">
            </form>
        </li>
    </ul>
{% endblock %}
